name: CI/CD & Monitoring for ML

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # SHA-pinned: actions/checkout@v4 (tag: v4.1.7)
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Lint OpenAPI Spec
        run: |
          npm install -g @redocly/cli@latest
          if [ -f openapi.yaml ]; then
            redocly lint openapi.yaml \
              --skip-rule=no-empty-servers \
              --skip-rule=info-license
          else
            echo "openapi.yaml not found — skipping lint gate"
          fi

      - name: Lint Dockerfile
        run: |
          if [ -f Dockerfile ]; then
            docker run --rm -i hadolint/hadolint < Dockerfile
          else
            echo "Dockerfile not found — skipping hadolint gate"
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Run Unit Tests
        run: |
          if [ -f ./scripts/test-unit.sh ]; then
            chmod +x ./scripts/test-unit.sh && ./scripts/test-unit.sh
          else
            echo "test-unit.sh not found — skipping"
          fi

      - name: Run Contract Tests
        run: |
          if [ -f ./scripts/test-contract.sh ]; then
            chmod +x ./scripts/test-contract.sh && ./scripts/test-contract.sh
          else
            echo "test-contract.sh not found — skipping"
          fi

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        # SHA-pinned: docker/setup-buildx-action@v3 (tag: v3.4.0)
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image for Scan
        # SHA-pinned: docker/build-push-action@v5 (tag: v5.4.0)
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/image.tar
          push: false

      - name: Upload Image Artifact
        # SHA-pinned: actions/upload-artifact@v4 (tag: v4.3.3)
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: /tmp/image.tar

  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download Image Artifact
        # SHA-pinned: actions/download-artifact@v4 (tag: v4.1.7)
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load Docker Image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy Vulnerability Scanner
        # SHA-pinned: aquasecurity/trivy-action@0.20.0
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

  push:
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: container-image
          path: /tmp

      - name: Load Docker Image
        run: docker load --input /tmp/image.tar

      - name: Log in to GHCR
        # SHA-pinned: docker/login-action@v3 (tag: v3.2.0)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to Staging
        run: |
          if [ -f ./scripts/deploy.sh ]; then
            chmod +x ./scripts/deploy.sh
            ./scripts/deploy.sh staging ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
          else
            echo "deploy.sh not found — skipping"
          fi

  smoke-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Run Smoke Tests on Staging
        run: |
          if [ -f ./scripts/smoke.sh ]; then
            chmod +x ./scripts/smoke.sh && ./scripts/smoke.sh staging
          else
            echo "smoke.sh not found — skipping"
          fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: smoke-staging
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy Canary (10%)
        run: |
          if [ -f ./scripts/deploy.sh ]; then
            chmod +x ./scripts/deploy.sh
            ./scripts/deploy.sh production-canary ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }} --canary-weight=10
          else
            echo "deploy.sh not found — skipping"
          fi

      - name: Verify Canary Performance
        run: |
          if [ -f ./scripts/canary-verify.sh ]; then
            chmod +x ./scripts/canary-verify.sh && ./scripts/canary-verify.sh production-canary
          else
            echo "canary-verify.sh not found — skipping"
          fi

      - name: Promote to Full Rollout (100%)
        run: |
          if [ -f ./scripts/deploy.sh ]; then
            ./scripts/deploy.sh production ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.IMAGE_TAG }}
          else
            echo "deploy.sh not found — skipping"
          fi
